<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8"/>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/static/favicon-192.png"/>


  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>LSN2K Vault — Coach Taylor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <style>

    :root{

      --crimson:#7d0a1c;

      --crimson-dim:#590713;

      --crimson-hi:#b51a31;

      --gold:#d4a94f;

      --gold-soft:#e6c97d;

      --black:#0a0a0a;

      --surface:#141414;

      --surface2:#1a1a1a;

      --surface3:#1f1f1f;

      --border:#262626;

      --text:#ececec;

      --muted:#8a8a8a;

      --dim:#5a5a5a;

      /* map old pink vars to gold for existing rules */

      --pink:#d4a94f;

      --pink-soft:#e6c97d;

    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

    body{

      font-family:"Public Sans",system-ui,-apple-system,sans-serif;

      background:var(--black);color:var(--text);

      height:100dvh;display:flex;flex-direction:column;overflow:hidden;

    }



    /* ── Header ── */

    header{

      background:var(--crimson);border-bottom:3px solid var(--crimson-hi);

      padding:10px 22px;display:flex;align-items:center;justify-content:space-between;

      gap:14px;flex-shrink:0;

    }

    .brand{display:flex;align-items:center;gap:13px;min-width:0;}

    .brand img{height:44px;width:auto;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5));}

    .brand h1{

      font-family:"Oswald",sans-serif;font-weight:600;font-size:1.25rem;

      letter-spacing:.5px;color:#fff;text-transform:uppercase;line-height:1;

    }

    .brand .sub{

      font-size:.64rem;letter-spacing:2px;text-transform:uppercase;

      color:rgba(255,255,255,.55);margin-top:5px;font-weight:600;

    }

    .header-right{display:flex;align-items:center;gap:12px;flex-shrink:0;}

    .szn-pill{

      font-family:"Oswald",sans-serif;font-size:.7rem;font-weight:600;letter-spacing:1.5px;

      color:#fff;border:1px solid rgba(255,255,255,.4);padding:5px 12px;border-radius:2px;

      text-transform:uppercase;white-space:nowrap;

    }

        #reset-btn{
      background:#fff;border:none;color:var(--crimson);
      padding:6px 16px;border-radius:3px;cursor:pointer;font-size:.72rem;font-weight:700;
      font-family:"Oswald",sans-serif;text-transform:uppercase;letter-spacing:.08em;
      transition:.15s;white-space:nowrap;
    }
    #reset-btn:hover{background:rgba(255,255,255,.85);}



    /* ── Scrollable main ── */

    #messages{

      flex:1;overflow-y:auto;display:flex;flex-direction:column;

      background:radial-gradient(110% 45% at 50% 0%,#15090b 0%,var(--black) 55%);

      scrollbar-width:thin;scrollbar-color:#2a2a2a transparent;

    }

    #messages::-webkit-scrollbar{width:6px;}

    #messages::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px;}



    /* ── Landing / empty state ── */

    #landing{

      flex:1;display:flex;flex-direction:column;align-items:center;

      justify-content:center;padding:28px 24px 20px;gap:0;

    }



    .logo-hero{
      width:auto;max-width:min(400px,55vw);max-height:32vh;
      object-fit:contain;
      filter:drop-shadow(0 6px 28px rgba(110,7,23,.45));
      margin-bottom:20px;
    }



    .coach-row{

      display:flex;align-items:center;gap:18px;

      max-width:520px;width:100%;

    }

    .coach-face{

      width:86px;height:auto;

      flex-shrink:0;

    }

    .coach-copy h2{

      font-family:"Oswald",sans-serif;font-weight:700;font-size:1.5rem;

      text-transform:uppercase;letter-spacing:.3px;color:#fff;line-height:1.05;

    }

    .coach-copy h2 em{color:var(--pink);font-style:normal;}

    .coach-copy p{

      font-size:.88rem;color:var(--muted);margin-top:8px;line-height:1.55;

    }



    /* ── Suggestion cards ── */

    #suggestions{

      display:grid;grid-template-columns:1fr 1fr;gap:9px;

      max-width:820px;width:100%;margin-top:26px;

    }

    .suggestion{

      display:flex;align-items:center;gap:11px;text-align:left;

      background:var(--surface2);border:1px solid var(--border);

      border-left:3px solid var(--crimson);

      color:#d0d0d0;padding:12px 14px;border-radius:4px;

      font-size:.88rem;cursor:pointer;

      font-family:"Public Sans",sans-serif;transition:.15s;

    }

    .suggestion:hover{background:#1c1010;border-left-color:var(--crimson-hi);color:#fff;}

    .suggestion .cat{

      font-family:"Oswald",sans-serif;font-size:.63rem;font-weight:600;

      letter-spacing:1.5px;color:var(--pink);text-transform:uppercase;

      flex-shrink:0;width:54px;

    }

    .suggestion .label{white-space:nowrap;flex:1;}

    .suggestion .arr{margin-left:auto;color:var(--dim);font-size:1rem;flex-shrink:0;padding-left:8px;}



    /* ── Chat messages ── */

    #chat-wrap{

      flex:1;padding:28px 0 8px;

      display:flex;flex-direction:column;gap:24px;

    }

    .msg{

      max-width:820px;width:100%;margin:0 auto;padding:0 24px;

      display:flex;gap:13px;align-items:flex-start;

    }

    .msg.typing-msg{align-items:center;}

    .msg.user{flex-direction:row-reverse;}



    .avatar{

      width:48px;height:auto;flex-shrink:0;margin-top:0;

      display:block;object-fit:contain;

    }

    .user-avatar{
      width:38px;height:38px;border-radius:50%;flex-shrink:0;
      background:#2a2a2a;color:#bbb;display:flex;align-items:center;justify-content:center;
      font-weight:400;font-size:.72rem;font-family:"Oswald",sans-serif;
      letter-spacing:1.5px;text-transform:uppercase;
    }



    .msg-col{display:flex;flex-direction:column;gap:7px;max-width:calc(100% - 52px);}

    .msg.user .msg-col{align-items:flex-end;}



    .nameplate{

      font-family:"Oswald",sans-serif;font-size:.72rem;letter-spacing:1.5px;

      text-transform:uppercase;color:var(--pink);font-weight:600;

    }

    .nameplate b{color:var(--dim);font-weight:500;margin-left:8px;letter-spacing:1px;}



    .bubble{

      padding:16px 20px;line-height:1.85;font-size:.93rem;border-radius:12px;

      font-family:"Roboto",sans-serif;

    }

    .msg.assistant .bubble{

      background:var(--surface2);border:1px solid var(--border);border-top-left-radius:4px;

    }

    .msg.user .bubble{

      background:var(--surface3);border:1px solid var(--border);border-top-right-radius:4px;

    }

    .bubble p{margin-bottom:1.1em;}.bubble p:last-child{margin-bottom:0;}

    .bubble strong{color:var(--gold-soft);font-weight:700;}

    .bubble em{color:#bdbdbd;}

    .bubble ul,.bubble ol{padding-left:1.3em;margin:.5em 0;}

    .bubble li{margin-bottom:.25em;}

    .bubble h2,.bubble h3,.bubble h4{font-family:"Roboto",sans-serif;font-weight:700;letter-spacing:0;color:#fff;margin:1.1em 0 .5em;}

    .bubble h2{font-size:1.1rem;}.bubble h3{font-size:1rem;}.bubble h4{font-size:.92rem;color:#ccc;}

    .bubble hr{border:none;border-top:1px solid var(--border);margin:.9em 0;}

    .bubble code{

      background:#0d0d0d;padding:2px 6px;border-radius:4px;

      font-family:"SF Mono",Consolas,monospace;font-size:.82em;color:var(--pink-soft);

    }

    .bubble pre{

      background:#0d0d0d;padding:11px 15px;border-radius:8px;

      overflow-x:auto;margin:.6em 0;border:1px solid var(--border);

    }

    .bubble pre code{padding:0;background:none;}

    .bubble table{ margin:1.6em 0;

      border-collapse:collapse;width:100%;font-size:.88rem;

      border:1px solid var(--border);border-radius:4px;overflow:hidden;

    }

    .bubble thead th{
      background:#5a0616;color:#fff;font-family:"Roboto",sans-serif;
      font-weight:700;text-transform:uppercase;letter-spacing:.08em;
      font-size:.74rem;padding:9px 13px;text-align:left;
    }

    .bubble tbody td{

      padding:9px 13px;border-top:1px solid #1e1e1e;color:#dcdcdc;

      font-family:"Roboto Mono",monospace;font-size:.84rem;

    }

    .bubble tbody tr:nth-child(odd) td{background:#121212;}

    /* ── Thinking ── */

    .thinking-toggle{

      font-family:"Oswald",sans-serif;font-size:.7rem;letter-spacing:1px;

      text-transform:uppercase;color:var(--dim);cursor:pointer;border:none;

      background:none;padding:2px 0;margin-bottom:8px;

      display:flex;align-items:center;gap:6px;font-weight:500;

    }

    .thinking-toggle:hover{color:var(--muted);}

    .thinking-content{

      display:none;background:#0d0d0d;border-left:2px solid var(--crimson);

      padding:9px 13px;margin-bottom:11px;font-size:.8rem;color:var(--muted);

      border-radius:0 6px 6px 0;white-space:pre-wrap;

      font-family:"SF Mono",Consolas,monospace;line-height:1.55;

    }



    /* ── Typing ── */

    .coach-status-text{

      font-size:.88rem;color:var(--muted);font-style:italic;line-height:1.5;

      font-family:"Public Sans",sans-serif;display:block;

    }

    .typing{display:flex;gap:5px;padding:14px 6px;}

    .bubble.status-mode{

      background:var(--surface2);border:1px solid var(--border);

      min-width:220px;max-width:420px;padding:12px 16px;

      border-top-left-radius:4px;

    }

    .typing span{width:7px;height:7px;border-radius:50%;background:var(--crimson-hi);animation:bounce 1.2s infinite;}

    .typing span:nth-child(2){animation-delay:.2s;}

    .typing span:nth-child(3){animation-delay:.4s;}

    @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-6px);opacity:1;}}



    /* ── Input ── */

    #input-area{

      background:var(--surface2);border-top:1px solid var(--border);

      padding:14px 24px 18px;flex-shrink:0;

    }

    #input-row{max-width:820px;margin:0 auto;display:flex;gap:11px;align-items:flex-end;}

    #user-input{

      flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;

      color:var(--text);padding:12px 16px;font-size:.93rem;resize:none;

      min-height:46px;max-height:168px;outline:none;line-height:1.5;

      font-family:"Public Sans",sans-serif;transition:border-color .15s;

    }

    #user-input:focus{border-color:var(--crimson-hi);}

    #user-input::placeholder{color:var(--dim);}

    #send-btn{

      width:46px;height:46px;border-radius:50%;background:var(--crimson);border:none;

      color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;

      flex-shrink:0;transition:background .15s;

    }

    #send-btn:hover:not(:disabled){background:var(--crimson-hi);}

    #send-btn:disabled{background:#333;cursor:not-allowed;}

    #send-btn svg{width:18px;height:18px;}

    #status{

      max-width:820px;margin:6px auto 0;padding:0 2px;

      font-family:"Oswald",sans-serif;font-size:.68rem;letter-spacing:1px;

      text-transform:uppercase;color:var(--dim);min-height:14px;

    }



    @media(max-width:640px){

      .brand img{height:38px;}.brand h1{font-size:1.05rem;}

      .szn-pill{display:none;}

      .logo-hero{
      width:auto;max-width:min(400px,55vw);max-height:32vh;
      object-fit:contain;
      filter:drop-shadow(0 6px 28px rgba(110,7,23,.45));
      margin-bottom:20px;
    }

      .coach-copy h2{font-size:1.25rem;}

      #suggestions{grid-template-columns:1fr;}

      .msg{padding:0 14px;}

    }


    .msg-actions{
      display:flex;justify-content:flex-end;margin-top:6px;opacity:1;
      transition:opacity .15s;
    }
    .msg:hover .msg-actions{ opacity:1; }
    /* always visible on touch devices */
    @media(hover:none){ .msg-actions{ opacity:1; } }
    .share-btn{
      background:none;border:none;color:#444;
      font-family:"Oswald",sans-serif;font-size:.62rem;letter-spacing:1px;
      text-transform:uppercase;padding:4px 8px;border-radius:3px;cursor:pointer;
      display:flex;align-items:center;gap:5px;transition:.15s;
    }
    .share-btn:hover{ color:#aaa; }
    .share-btn.copied{ color:#4caf50; }
    .share-btn svg{ width:11px;height:11px; }

    /* ── Mobile layout ── */
    @media(max-width:640px){
      header{ padding:8px 14px; }
      .brand img{ height:34px; }
      .brand h1{ font-size:1rem; }
      .brand .sub{ display:none; }
      .szn-pill{ display:none; }
      #reset-btn{ padding:5px 10px;font-size:.65rem; }

      #landing{ padding:8px 14px 12px;gap:0;justify-content:flex-start; }
      .logo-hero{
      width:auto;max-width:min(400px,55vw);max-height:32vh;
      object-fit:contain;
      filter:drop-shadow(0 6px 28px rgba(110,7,23,.45));
      margin-bottom:20px;
    }
      .coach-row{ gap:12px;max-width:100%;margin:24px 0; }
      .coach-face{ width:60px; }
      .coach-copy h2{ font-size:1.1rem; }
      .coach-copy p{ font-size:.8rem;margin-top:5px; }

      #suggestions{
        grid-template-columns:1fr;gap:7px;margin-top:0;
      }
      #suggestions .suggestion:nth-child(n+3){ display:none; }
      .suggestion{ padding:10px 12px;font-size:.82rem; }
      .suggestion .cat{ width:46px;font-size:.58rem; }

      #chat-wrap{ padding:16px 0 4px;gap:16px; }
      .msg{ padding:0 12px;gap:8px; }
      .avatar{ width:34px; }
      .user-avatar{ width:28px;height:28px;font-size:.6rem; }
      .msg-col{ max-width:calc(100% - 42px); }
      .nameplate{ font-size:.64rem; }
      .bubble{ padding:11px 13px;font-size:.87rem;line-height:1.7; }
      .bubble table{ font-size:.78rem; }
      .bubble thead th{ padding:7px 9px;font-size:.66rem; }
      .bubble tbody td{ padding:7px 9px;font-size:.76rem; }

      #input-area{ padding:10px 12px 14px; }
      #input-row{ gap:8px; }
      #user-input{ font-size:.88rem;padding:10px 12px;border-radius:10px; }
      #send-btn{ width:42px;height:42px; }
      #status{ font-size:.62rem; }

      .coach-status-text{ font-size:.8rem; }
      .bubble.status-mode{ min-width:160px; }
    }

    .thumb-btn{ padding:4px 8px; }
    .thumb-btn.rated{ border-color:var(--gold);color:var(--gold); }
    .nameplate.user-nameplate{color:var(--muted);}

    .bubble table strong{ color:var(--text);font-weight:700; }

    .bubble table{ max-width:100%;overflow-x:auto;display:block; }
    .bubble table thead,.bubble table tbody,.bubble table tr{ display:table;width:100%;table-layout:fixed; }

    @media(max-width:640px){
      #input-area{ position:sticky;bottom:0;z-index:100; }
      #user-input{ font-size:16px !important; }
      #input-row{ flex-wrap:nowrap;align-items:flex-end; }
      #send-btn{ flex-shrink:0;min-width:42px; }
    }

    .recent-cat{ color:var(--muted) !important;display:flex;align-items:center; }

    .bubble table strong{ color:var(--text);font-weight:400; }
    .bubble td strong, .bubble th strong{ color:inherit;font-weight:inherit; }
  </style>

</head>

<body>



<header>

  <div class="brand">

    <img src="/static/LSN2K_Logo.png" alt="LSN2K"/>

    <div>

      <h1>LSN2K Vault</h1>

      <div class="sub">League History &bull; Records</div>

    </div>

  </div>

  <div class="header-right">

    <span class="szn-pill">{{ season_count }} Seasons &bull; Est. 2000</span>

    <button id="reset-btn" onclick="resetChat()">New chat</button>

  </div>

</header>



<div id="messages">



  <!-- Landing -->

  <div id="landing">

    <img src="/static/LSN2K_Logo.png" alt="LSN2K" class="logo-hero"/>



    <div class="coach-row">

      <img src="/static/SteveHead.png" alt="Coach Taylor" class="coach-face"/>

      <div class="coach-copy">

        <h2><em>Ask</em> Steve Taylor</h2>

        <p>{{ season_count }} seasons of LSN2K history on the board — every score, trade and grudge. Toss me a question.</p>

      </div>

    </div>



    <div id="suggestions">
      <button class="suggestion" onclick="ask('Who has the most championships?')"><span class="cat">Rings</span><span class="label">Who has the most championships?</span><span class="arr">›</span></button>
      <button class="suggestion" id="recent-0" onclick="ask('Worst trade in league history?')"><span class="cat recent-cat">⏱ Recent</span><span class="label recent-label">Worst trade in league history?</span></button>
      <button class="suggestion" onclick="ask('What is the highest single-game score ever?')"><span class="cat">Record</span><span class="label">Highest single-game score ever?</span><span class="arr">›</span></button>
      <button class="suggestion" id="recent-1" onclick="ask('Who has the most playoff appearances without a ring?')"><span class="cat recent-cat">⏱ Recent</span><span class="label recent-label">Who has the most playoff appearances without a ring?</span></button>
      <button class="suggestion" onclick="ask('Who has the best all-time record?')"><span class="cat">Record</span><span class="label">Best all-time records?</span><span class="arr">›</span></button>
      <button class="suggestion" id="recent-2" onclick="ask('Who drafts the best?')"><span class="cat recent-cat">⏱ Recent</span><span class="label recent-label">Who drafts the best?</span></button>
    </div>

  </div>



  <!-- Chat -->

  <div id="chat-wrap" style="display:none;"></div>



</div>



<div id="input-area">

  <div id="input-row">

    <textarea id="user-input" placeholder="Ask Coach Taylor about the league…" rows="1"></textarea>

    <button id="send-btn" onclick="sendMessage()" title="Send">

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

        <line x1="22" y1="2" x2="11" y2="13"/>

        <polygon points="22 2 15 22 11 13 2 9 22 2"/>

      </svg>

    </button>

  </div>

  <div id="status"></div>

</div>



<script>

const messagesEl    = document.getElementById('messages');

const landingEl     = document.getElementById('landing');

const chatWrap      = document.getElementById('chat-wrap');

const inputEl       = document.getElementById('user-input');

const sendBtn       = document.getElementById('send-btn');

const statusEl      = document.getElementById('status');

const COACH_IMG     = '/static/SteveHead.png';



let isLoading = false;

let chatStarted = false;

let debugMode = false;

let statusInterval = null;



const coachStatuses = [

  "Writing Dusty Butler a green slip for calling me a dickhead...",

  "Driving the cart back in from the end zone, hold on...",

  "Taping some freshman's ankle — probably wrong, whatever...",

  "Telling a linebacker he looks slow today...",

  "Hiding the good ice packs so the players can't have them...",

  "Taking a smoke break behind the field house...",

  "Yelling at the water boy for being three seconds late...",

  "Eating the team's post-game snacks before they get here...",

  "Threatening to bench someone for blinking wrong...",

  "Filling out a disciplinary form for a kid who looked at me funny...",

  "Making the backup QB do extra laps for absolutely no reason...",

  "Arguing with a ref about a call from two games ago...",

  "Telling someone to walk it off — it's probably not that bad...",

  "Confiscating a player's headphones because I was in a bad mood...",

  "Ignoring the trainer manual and doing it my way...",

  "Giving someone the wrong stretch routine on purpose...",

  "Chewing out a sophomore for breathing too loud on the sideline...",

  "Hoarding the new kinesiology tape and using the old stuff on players...",

  "Making a freshman carry all the equipment by himself...",

  "Threatening to call someone's parents over absolutely nothing...",

];



function startStatusRotation() {

  let i = Math.floor(Math.random() * coachStatuses.length);

  function update() {

    const typingBubble = document.querySelector('#typing-indicator .bubble');

    statusEl.textContent = coachStatuses[i];

    if (typingBubble) {

      typingBubble.classList.add('status-mode');

      typingBubble.classList.remove('typing');

      typingBubble.innerHTML = `<span class="coach-status-text">${coachStatuses[i]}</span>`;

    }

    i = (i + 1) % coachStatuses.length;

  }

  update();

  statusInterval = setInterval(update, 3500);

}



function stopStatusRotation() {

  if (statusInterval) { clearInterval(statusInterval); statusInterval = null; }

  statusEl.textContent = '';

}



inputEl.addEventListener('input', () => {

  inputEl.style.height = 'auto';

  inputEl.style.height = Math.min(inputEl.scrollHeight, 168) + 'px';

});

inputEl.addEventListener('keydown', (e) => {

  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }

});



function ask(text){ inputEl.value = text; sendMessage(); }



function startChat(){

  if (chatStarted) return;

  chatStarted = true;

  landingEl.style.display = 'none';

  chatWrap.style.display = 'flex';

  chatWrap.style.flexDirection = 'column';

  chatWrap.style.gap = '24px';

}



/* ── Markdown renderer with pipe-table support ── */

function formatText(text){

  const tables = [];

  text = text.replace(/(^\|.+\|[ \t]*\n\|[ \t:|-]+\|[ \t]*\n(?:\|.*\|[ \t]*\n?)+)/gm, (m) => {

    tables.push(renderTable(m));

    return `T${tables.length - 1}`;

  });

  let html = text

    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')

    .replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>')

    .replace(/`([^`]+)`/g, '<code>$1</code>')

    .replace(/^### (.+)$/gm, '<h4>$1</h4>')

    .replace(/^## (.+)$/gm,  '<h3>$1</h3>')

    .replace(/^# (.+)$/gm,   '<h2>$1</h2>')

    .replace(/^[-•] (.+)$/gm, '<li>$1</li>')

    .replace(/(<li>[\s\S]+?<\/li>)/g, '<ul>$1</ul>')

    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')

    .replace(/^---$/gm, '<hr>')

    .split(/\n\n+/)

    .map(p => p.trim() ? (p.match(/^<(h\d|ul|ol|hr)/) || p.includes('T') ? p : `<p>${p.replace(/\n/g,' ')}</p>`) : '')

    .filter(Boolean).join('').replace(/\.([A-Z])/g, '. $1');

  return html.replace(/T(\d+)/g, (_, i) => tables[+i]);

}



function renderTable(md){

  const rows = md.trim().split('\n').filter(r => r.trim());

  const cells = rows.map(r => r.replace(/^\||\|$/g,'').split('|').map(c => c.trim()));

  const head = cells[0], body = cells.slice(2);

  let h = '<table><thead><tr>' + head.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>';

  for (const row of body) h += '<tr>' + row.map(c => `<td>${c.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</td>`).join('') + '</tr>';

  return h + '</tbody></table>';

}



function addMessage(role, content){

  startChat();

  const div = document.createElement('div');

  div.className = `msg ${role}`;



  // Avatar

  if (role === 'assistant'){

    const img = document.createElement('img');

    img.className = 'avatar'; img.src = COACH_IMG; img.alt = 'Coach Taylor';

    div.appendChild(img);

  } else {

    const av = document.createElement('div');

    av.className = 'user-avatar'; av.textContent = 'You';

    div.appendChild(av);

  }



  const col = document.createElement('div');

  col.className = 'msg-col';



  if (role === 'assistant'){

    const np = document.createElement('div');

    np.className = 'nameplate';

    np.textContent = 'Coach Taylor';

    col.appendChild(np);

  }



  const bubble = document.createElement('div');

  bubble.className = 'bubble';



  if (typeof content === 'string'){

    bubble.innerHTML = formatText(content);

  } else if (Array.isArray(content)){

    let html = '', idx = 0;

    for (const block of content){

      if (block.type === 'thinking' && block.thinking){

        const i = idx++;

        html += `<button class="thinking-toggle" onclick="toggleThinking(${i})">▸ Coach's read</button>`;

        html += `<div class="thinking-content" id="thinking-${i}">${escapeHtml(block.thinking)}</div>`;

      } else if (block.type === 'text'){

        html += formatText(block.text);

      }

    }

    bubble.innerHTML = html;

  }



  col.appendChild(bubble);

  // Share button for assistant messages
  if (role === 'assistant') {
    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    const shareBtn = document.createElement('button');
    shareBtn.className = 'share-btn';
    const rawText = typeof content === 'string' ? content :
      (Array.isArray(content) ? content.filter(b=>b.type==='text').map(b=>b.text).join('\n') : '');
    shareBtn.onclick = () => copyResponse(shareBtn, rawText);
    shareBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg><span class="share-label">Share</span>`;
    actions.appendChild(shareBtn);
    col.appendChild(actions);
  }

  div.appendChild(col);

  chatWrap.appendChild(div);

  messagesEl.scrollTop = messagesEl.scrollHeight;

}



function toggleThinking(i){

  const el = document.getElementById(`thinking-${i}`);

  const btn = el.previousElementSibling;

  const open = el.style.display === 'block';

  el.style.display = open ? 'none' : 'block';

  btn.textContent = open ? '▸ Coach\'s read' : '▾ Coach\'s read';

}



function escapeHtml(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }



function addTyping(){

  startChat();

  const div = document.createElement('div');

  div.className = 'msg assistant typing-msg'; div.id = 'typing-indicator';

  const img = document.createElement('img');

  img.className = 'avatar'; img.src = COACH_IMG; img.alt = '';

  const col = document.createElement('div'); col.className = 'msg-col';

  const bubble = document.createElement('div');

  bubble.className = 'bubble typing';

  bubble.innerHTML = '<span></span><span></span><span></span>';

  col.appendChild(bubble);

  div.appendChild(img); div.appendChild(col);

  chatWrap.appendChild(div);

  messagesEl.scrollTop = messagesEl.scrollHeight;

}

function removeTyping(){ document.getElementById('typing-indicator')?.remove(); }



async function sendMessage(){

  const text = inputEl.value.trim();

  if (!text || isLoading) return;

  isLoading = true; sendBtn.disabled = true; inputEl.disabled = true;

  inputEl.value = ''; inputEl.style.height = 'auto';



  // Check for debug mode prefix

  let queryText = text;

  if (text.toLowerCase().startsWith('/debug ')) {

    debugMode = true;

    queryText = text.slice(7).trim();

  } else {

    debugMode = false;

  }



  addMessage('user', queryText);

  addTyping();

  if (debugMode) statusEl.textContent = 'Debug mode on…';

  else startStatusRotation();



  let bubble = null;

  let fullText = '';



  try {

    const res = await fetch('/chat', {

      method: 'POST',

      headers: { 'Content-Type': 'application/json' },

      body: JSON.stringify({ message: queryText }),

    });



    if (!res.ok) throw new Error(`HTTP ${res.status}`);



    const reader = res.body.getReader();

    const decoder = new TextDecoder();

    let buffer = '';



    while (true) {

      const { done, value } = await reader.read();

      if (done) break;



      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');

      buffer = lines.pop(); // keep incomplete line



      for (const line of lines) {

        if (!line.startsWith('data: ')) continue;

        let event;

        try { event = JSON.parse(line.slice(6)); } catch { continue; }



        if (event.type === 'text') {

          if (!bubble) {

            removeTyping();

            bubble = createStreamBubble();

            statusEl.textContent = '';

          }

          fullText += event.chunk;

          if (!bubble._rafPending) {
            bubble._rafPending = true;
            requestAnimationFrame(() => {
              bubble.innerHTML = formatText(fullText);
              bubble._rafPending = false;
            });
          }

          bubble.closest('#chat-wrap').parentElement.scrollTop = 99999;



        } else if (event.type === 'querying') {

          if (debugMode) statusEl.textContent = 'SQL: ' + event.sql;

          else statusEl.textContent = '';



        } else if (event.type === 'done') {

          stopStatusRotation();
          finalizeStreamBubble(fullText);

          if (event.content) {

            await fetch('/save', {

              method: 'POST',

              headers: { 'Content-Type': 'application/json' },

              body: JSON.stringify({ content: event.content }),

            });

          }



        } else if (event.type === 'error') {

          stopStatusRotation();

          removeTyping();

          addMessage('assistant', `⚠️ ${event.message}`);

        }

      }

    }



    if (!bubble) {

      removeTyping();

      addMessage('assistant', '⚠️ No response received.');

    }



  } catch(e) {

    stopStatusRotation();

    removeTyping();

    addMessage('assistant', '⚠️ Network error — please try again.');

  } finally {

    isLoading = false; sendBtn.disabled = false; inputEl.disabled = false; inputEl.focus();

  }

}



function createStreamBubble() {

  startChat();

  const div = document.createElement('div');

  div.className = 'msg assistant';



  const img = document.createElement('img');

  img.className = 'avatar'; img.src = COACH_IMG; img.alt = 'Coach Taylor';



  const col = document.createElement('div');

  col.className = 'msg-col';



  const np = document.createElement('div');

  np.className = 'nameplate';

  np.textContent = 'Coach Taylor';

  col.appendChild(np);



  const bubble = document.createElement('div');

  bubble.className = 'bubble';

  col.appendChild(bubble);



  // Actions bar (share + rating) — populated after stream completes via finalizeStreamBubble
  const actions = document.createElement('div');
  actions.className = 'msg-actions';
  actions.id = 'stream-actions-pending';
  col.appendChild(actions);

  div.appendChild(img);

  div.appendChild(col);

  chatWrap.appendChild(div);

  return bubble;

}

function finalizeStreamBubble(fullText) {
  // Now do the full markdown render
  const pendingBubble = document.querySelector('#stream-actions-pending')?.closest('.msg-col')?.querySelector('.bubble');
  if (pendingBubble) {
    pendingBubble.innerHTML = formatText(fullText);
  }
  const actions = document.getElementById('stream-actions-pending');
  if (!actions) return;
  actions.removeAttribute('id');

  // Share button
  const shareBtn = document.createElement('button');
  shareBtn.className = 'share-btn';
  shareBtn.onclick = () => copyResponse(shareBtn, fullText);
  shareBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg><span class="share-label">Share</span>`;
  actions.appendChild(shareBtn);

  // Thumbs up / down
  const thumbUp = document.createElement('button');
  thumbUp.className = 'share-btn thumb-btn';
  thumbUp.title = 'Good answer';
  thumbUp.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14z"/><path d="M7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg>`;

  const thumbDown = document.createElement('button');
  thumbDown.className = 'share-btn thumb-btn';
  thumbDown.title = 'Bad answer';
  thumbDown.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15v4a3 3 0 003 3l4-9V2H5.72a2 2 0 00-2 1.7l-1.38 9a2 2 0 002 2.3H10z"/><path d="M17 2h2.67A2.31 2.31 0 0122 4v7a2.31 2.31 0 01-2.33 2H17"/></svg>`;

  thumbUp.onclick = () => rateResponse(thumbUp, thumbDown, 1, fullText);
  thumbDown.onclick = () => rateResponse(thumbDown, thumbUp, -1, fullText);

  actions.appendChild(thumbUp);
  actions.appendChild(thumbDown);
}



async function resetChat(){

  try { await fetch('/reset',{method:'POST'}); } catch(e){}

  window.location.reload();

}


function rateResponse(activeBtn, otherBtn, rating, text) {
  activeBtn.classList.add('rated');
  otherBtn.classList.remove('rated');
  otherBtn.style.opacity = '0.3';
  fetch('/rate', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({rating, text: text.slice(0, 300)}),
  });
}

function copyResponse(btn, text) {
  // Strip markdown-ish syntax for clean copy
  const clean = text
    .replace(/\*\*(.*?)\*\*/g, '$1')
    .replace(/\*(.*?)\*/g, '$1')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/^#+\s+/gm, '')
    .replace(/^[-•]\s+/gm, '• ')
    .trim();
  navigator.clipboard.writeText(clean).then(() => {
    btn.classList.add('copied');
    btn.querySelector('.share-label').textContent = 'Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.querySelector('.share-label').textContent = 'Share';
    }, 2000);
  });
}


const RECENT_DEFAULTS = ["Worst trade in league history?", "Who has the most playoff appearances without a ring?", "Who drafts the best?"];

async function loadRecentQueries() {
  // Set defaults first
  RECENT_DEFAULTS.forEach((q, i) => {
    const btn = document.getElementById('recent-' + i);
    if (btn) {
      btn.querySelector('.recent-label').textContent = q;
      btn.onclick = () => ask(q);
    }
  });
  // Then try to load actual recents
  try {
    const resp = await fetch('/recent');
    const data = await resp.json();
    const recents = data.recent || [];
    recents.forEach((q, i) => {
      const btn = document.getElementById('recent-' + i);
      if (btn && q) {
        btn.querySelector('.recent-label').textContent = q;
        btn.onclick = () => ask(q);
      }
    });
  } catch(e) {}
}
// Call immediately and also ensure it runs after any dynamic rendering
loadRecentQueries();
window.addEventListener('load', loadRecentQueries);
